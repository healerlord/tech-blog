name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CMS_AUTH_URL: ${{ vars.CMS_AUTH_URL }}
    steps:
      - name: Verify CMS auth configuration
        run: |
          if [ -z "$CMS_AUTH_URL" ]; then
            echo "::warning::CMS_AUTH_URL is not set; the admin falls back to GitHub token login until the OAuth Worker is configured."
          fi
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          package-manager: pnpm@11

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
